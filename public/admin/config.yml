backend:
  name: git-gateway
  branch: master

# Media / assets stored in the repo
media_folder: "public/uploads"
public_folder: "/uploads"

# Site URL for the CMS preview
site_url: https://tear-wiki.pages.dev

collections:

  # ---- Mechanics ----
  - name: "mechanics"
    label: "Mechanics Pages"
    folder: "src/content/docs/mechanics"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title,       label: Title,       widget: string }
      - { name: description, label: Description,  widget: string }
      - { name: gameVersion, label: Game Version, widget: string, default: "v0.1" }
      - { name: body,        label: Content,      widget: markdown }

  # ---- Enemies ----
  - name: "enemies"
    label: "Enemy Pages"
    folder: "src/content/docs/enemies"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title,       label: Title,       widget: string }
